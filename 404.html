<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Страница не найдена</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f5f5f5;
        }
        .container {
            text-align: center;
        }
        .home-button {
            background-color: #3F51B5;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 1.2rem;
            border-radius: 4px;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        .home-button:hover {
            background-color: #303f9f;
        }
    </style>
    <script>
        // Сохраняем запрошенный путь (на всякий случай)
        sessionStorage.redirect = location.pathname + location.search + location.hash;

        // Функция для перехода на главную
        function goToHome() {
            window.location.href = '/todolist-redax-toolkit/';
        }
    </script>
</head>
<body>
<div class="container">
    <button class="home-button" onclick="goToHome()">
        На главную
    </button>
</div>
</body>
</html>
