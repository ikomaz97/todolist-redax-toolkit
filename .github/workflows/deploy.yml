- name: Deploy
  run: |
    git config --global user.name "GitHub Actions"
    git config --global user.email "actions@github.com"
    git clone --branch gh-pages https://github.com/ikomaz97/todolist-redax-toolkit.git gh-pages
    rm -rf gh-pages/*
    cp -r dist/* gh-pages/
    cd gh-pages
    git add .
    git commit -m "Update: $(date)"
    git push