<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Todolist Redirect</title>
    <script>
        // Сохраняем запрошенный путь (например, /login)
        sessionStorage.redirect = location.pathname + location.search + location.hash;
        // Перенаправляем на index.html
        window.location.replace('/todolist-redax-toolkit/');
    </script>
</head>
<body>
<p>Redirecting to application...</p>
</body>
</html>
